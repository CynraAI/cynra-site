<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Cynra - AI-driven market analytics engine for modern traders. Currently under redevelopment.">
    <title>Cynra</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Preload logo to ensure it loads first -->
    <link rel="preload" href="./cynra-logo.png" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="./cynra-favicon.png.png">
    <link rel="shortcut icon" type="image/png" href="./cynra-favicon.png.png">
    <link rel="apple-touch-icon" href="./cynra-favicon.png.png">
</head>

<body>
    <div class="container">
        <div class="content">
            <!-- Logo + Wordmark -->
            <div class="logo-wrapper">
                <img src="./cynra-logo.png" alt="Cynra Logo" class="logo" id="logo">
                <!-- Note: If you relocate the logo (e.g., to /assets/), update the src above -->
            </div>

            <!-- Main Text Content -->
            <div class="text-content" id="textContent">
                <h1 class="headline">Currently under redevelopment.</h1>
                <p class="subtext">AI-driven market analytics engine for modern traders.</p>
            </div>

            <!-- CTA Section -->
            <div class="cta-section" id="ctaSection">
                <!-- Get Updates CTA -->
                <button type="button" class="cta-button" id="getUpdatesButton">
                    Get updates
                </button>

                <!-- Inline waitlist form (revealed after clicking "Get updates") -->
                <form id="waitlistForm" class="waitlist-form" novalidate>
                    <label class="visually-hidden" for="waitlistEmail">
                        Enter your email to get updates when we launch
                    </label>
                    <input id="waitlistEmail" class="waitlist-input" type="email" name="email"
                        placeholder="you@example.com" required>
                    <button type="submit" class="waitlist-submit">
                        Notify me
                    </button>
                </form>

                <!-- Confirmation message shown after form submission -->
                <p id="waitlistMessage" class="waitlist-message" aria-live="polite"></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; <span id="currentYear"></span> Cynra. All rights reserved.</p>
        </footer>
    </div>

    <!-- Supabase Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Configuration (update with your Supabase credentials) -->
    <script src="config.js"></script>
    <script src="main.js"></script>
</body>

</html>
