<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cynra - AI-driven market analytics engine for modern traders. Currently under redevelopment.">
    <title>Cynra</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon placeholder - replace with actual favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
</head>
<body>
    <div class="container">
        <div class="content">
            <!-- Logo + Wordmark -->
            <div class="logo-wrapper">
                <img 
                    src="./cynra-logo.png" 
                    alt="Cynra Logo" 
                    class="logo"
                    id="logo"
                >
                <!-- Note: If you relocate the logo (e.g., to /assets/), update the src above -->
            </div>

            <!-- Main Text Content -->
            <div class="text-content" id="textContent">
                <h1 class="headline">Currently under redevelopment.</h1>
                <p class="subtext">AI-driven market analytics engine for modern traders.</p>
            </div>

            <!-- CTA Section -->
            <div class="cta-section" id="ctaSection">
                <!-- Option 1: Social Links (uncomment to use) -->
                <!--
                <div class="social-links">
                    <a href="#" class="social-link" aria-label="X (Twitter)">X</a>
                    <a href="#" class="social-link" aria-label="Instagram">Instagram</a>
                    <a href="#" class="social-link" aria-label="YouTube">YouTube</a>
                </div>
                -->
                <!-- Option 2: Get Updates Button (currently active) -->
                <a href="mailto:hello@cynra.ai" class="cta-button">Get updates</a>
                <!-- Note: Replace mailto link with waitlist form URL when ready -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; <span id="currentYear"></span> Cynra. All rights reserved.</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
